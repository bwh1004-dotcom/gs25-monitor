<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GS25 점포 모니터링</title>
  <style>
    :root {
      --blue: #003087;
      --orange: #FF6600;
      --light: #F4F6FA;
      --border: #DDE3EE;
      --text: #1A1F36;
      --muted: #7A869A;
      --ok: #00A878;
      --warn: #F59E0B;
      --bad: #EF4444;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: var(--blue);
      color: #fff;
      padding: 16px 20px 12px;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    header p  { font-size: 11px; opacity: .7; margin-top: 2px; }
    .step-bar {
      display: flex;
      background: #fff;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .step-item {
      flex: 1; text-align: center;
      padding: 10px 4px 8px;
      font-size: 11px; color: var(--muted);
      border-bottom: 3px solid transparent;
      cursor: pointer; white-space: nowrap;
      transition: all .2s;
    }
    .step-item.active { color: var(--blue); border-bottom-color: var(--orange); font-weight: 700; }
    .step-item.done { color: var(--ok); }
    .step-num {
      display: inline-block;
      width: 20px; height: 20px; line-height: 20px;
      border-radius: 50%;
      background: var(--border);
      font-size: 11px; font-weight: 700;
      margin-bottom: 2px;
    }
    .step-item.active .step-num { background: var(--orange); color: #fff; }
    .step-item.done  .step-num { background: var(--ok); color: #fff; }
    .section { display: none; padding: 20px 16px; animation: fadeIn .25s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .card {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 13px; font-weight: 700;
      color: var(--blue); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 10px; }
    label:first-child { margin-top: 0; }
    input, select, textarea {
      width: 100%; padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--light);
      color: var(--text);
      outline: none;
      transition: border .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); background: #fff; }
    textarea { resize: vertical; min-height: 70px; }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .photo-box {
      aspect-ratio: 1;
      border: 2px dashed var(--border);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      overflow: hidden; background: var(--light);
      transition: border-color .2s;
    }
    .photo-box:hover { border-color: var(--blue); }
    .photo-box.has-photo { border: 2px solid var(--ok); }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .photo-box .overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
    }
    .photo-box:hover .overlay { opacity: 1; }
    .photo-icon { font-size: 28px; display: block; }
    .photo-label { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: center; }
    .photo-badge {
      position: absolute; top: 4px; right: 4px;
      background: var(--ok); color: #fff;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
    }
    input[type="file"] { display: none; }
    .photo-comment { margin-top: 6px; font-size: 12px; padding: 7px 10px; }
    .monitor-row {
      display: flex; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .monitor-row:last-child { border-bottom: none; }
    .monitor-name { flex: 1; font-size: 13px; font-weight: 500; }
    .status-btns { display: flex; gap: 5px; }
    .status-btn {
      padding: 5px 10px; border-radius: 20px;
      border: 1.5px solid var(--border);
      font-size: 11px; font-weight: 600;
      cursor: pointer; background: #fff;
      transition: all .15s;
    }
    .status-btn[data-v="정상"].sel  { background: var(--ok);   color: #fff; border-color: var(--ok); }
    .status-btn[data-v="미흡"].sel  { background: var(--warn); color: #fff; border-color: var(--warn); }
    .status-btn[data-v="불량"].sel  { background: var(--bad);  color: #fff; border-color: var(--bad); }
    .btn {
      display: block; width: 100%;
      padding: 14px;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 16px;
      transition: opacity .2s;
    }
    .btn:active { opacity: .85; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-orange  { background: var(--orange); color: #fff; }
    .btn-outline { background: #fff; color: var(--blue); border: 1.5px solid var(--blue); }
    .result-wrap { text-align: center; padding: 40px 20px; }
    .result-icon { font-size: 60px; margin-bottom: 16px; }
    .result-wrap h2 { font-size: 20px; color: var(--blue); margin-bottom: 8px; }
    .result-wrap p  { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .result-detail {
      background: #fff; border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 14px 16px; margin-top: 20px;
      text-align: left;
    }
    .result-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; }
    .result-row span:first-child { color: var(--muted); }
    .result-row span:last-child  { font-weight: 600; }
    .loading-wrap {
      display: none; position: fixed; inset: 0;
      background: rgba(0,48,135,.85);
      z-index: 999; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 16px;
    }
    .loading-wrap.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,.3);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; font-weight: 600; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #1A1F36; color: #fff;
      padding: 10px 20px; border-radius: 30px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .3s;
      z-index: 998; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .info-row { display: flex; gap: 8px; }
    .info-row > * { flex: 1; }
  </style>
</head>
<body>

<header>
  <h1>🏪 GS25 점포 모니터링</h1>
  <p>점포 현장 점검 & Google Sheets 자동 전송</p>
</header>

<div class="step-bar">
  <div class="step-item active" data-step="1" onclick="goStep(1)">
    <div class="step-num">1</div><br>점포정보
  </div>
  <div class="step-item" data-step="2" onclick="goStep(2)">
    <div class="step-num">2</div><br>사진촬영
  </div>
  <div class="step-item" data-step="3" onclick="goStep(3)">
    <div class="step-num">3</div><br>모니터링
  </div>
  <div class="step-item" data-step="4" onclick="goStep(4)">
    <div class="step-num">4</div><br>제출
  </div>
</div>

<div class="section active" id="sec1">
  <div class="card">
    <div class="card-title">📋 기본 정보</div>
    <label>영업팀 <span style="color:var(--bad)">*</span></label>
    <select id="team"></select>
    <div class="info-row">
      <div>
        <label>점포코드 <span style="color:var(--bad)">*</span></label>
        <input type="text" id="storeCode" placeholder="예) GS-12345">
      </div>
      <div>
        <label>방문일자 <span style="color:var(--bad)">*</span></label>
        <input type="date" id="visitDate">
      </div>
    </div>
    <label>점포명 <span style="color:var(--bad)">*</span></label>
    <input type="text" id="storeName" placeholder="예) GS25 광주마륵점">
    <label>담당자명 <span style="color:var(--bad)">*</span></label>
    <input type="text" id="manager" placeholder="성명 입력">
  </div>
  <button class="btn btn-primary" onclick="nextStep(1)">다음 → 사진 촬영</button>
</div>

<div class="section" id="sec2">
  <div class="card">
    <div class="card-title">📷 사진 3장 촬영</div>
    <div class="photo-grid">
      <div>
        <div class="photo-box" id="box1" onclick="triggerFile(1)">
          <span class="photo-icon">🏪</span>
          <input type="file" id="file1" accept="image/*" capture="environment" onchange="loadPhoto(1,this)">
        </div>
        <div class="photo-label">외부 전경</div>
        <input type="text" class="photo-comment" id="cmt1" placeholder="코멘트">
      </div>
      <div>
        <div class="photo-box" id="box2" onclick="triggerFile(2)">
          <span class="photo-icon">🏬</span>
          <input type="file" id="file2" accept="image/*" capture="environment" onchange="loadPhoto(2,this)">
        </div>
        <div class="photo-label">내부 전경</div>
        <input type="text" class="photo-comment" id="cmt2" placeholder="코멘트">
      </div>
      <div>
        <div class="photo-box" id="box3" onclick="triggerFile(3)">
          <span class="photo-icon">📌</span>
          <input type="file" id="file3" accept="image/*" capture="environment" onchange="loadPhoto(3,this)">
        </div>
        <div class="photo-label">특이사항</div>
        <input type="text" class="photo-comment" id="cmt3" placeholder="코멘트">
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px;text-align:center;">
      📌 사진을 탭하면 카메라가 실행됩니다 (최소 1장 필수)
    </p>
  </div>
  <button class="btn btn-outline" onclick="goStep(1)">← 이전</button>
  <button class="btn btn-primary" onclick="nextStep(2)">다음 → 모니터링 항목</button>
</div>

<div class="section" id="sec3">
  <div class="card">
    <div class="card-title">✅ 모니터링 항목</div>
    <div id="monitorList"></div>
  </div>
  <div class="card">
    <div class="card-title">📝 종합 의견</div>
    <textarea id="overallNote" placeholder="전체 점검 의견, 개선 요청 사항 등 자유 기재"></textarea>
  </div>
  <button class="btn btn-outline" onclick="goStep(2)">← 이전</button>
  <button class="btn btn-primary" onclick="nextStep(3)">다음 → 최종 확인</button>
</div>

<div class="section" id="sec4">
  <div class="card">
    <div class="card-title">🔍 최종 확인</div>
    <div id="summaryBox"></div>
  </div>
  <button class="btn btn-outline" onclick="goStep(3)">← 이전</button>
  <button class="btn btn-orange" onclick="submitAll()">📤 Google Sheets에 전송</button>
</div>

<div class="section" id="sec5">
  <div class="result-wrap">
    <div class="result-icon">✅</div>
    <h2>전송 완료!</h2>
    <p>구글 시트에 기록되었습니다.<br>사진은 Drive 팀 폴더에 저장되었습니다.</p>
    <div class="result-detail" id="resultDetail"></div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="resetAll()">🔄 새 점포 입력</button>
  </div>
</div>

<div class="loading-wrap" id="loadingWrap">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">전송 중…</div>
</div>
<div class="toast" id="toast"></div>

<script>
const Config = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzw9Nd51VP4oIjXS0Xxg08H0DPAh02nyp4VOEJRpCrDAc4q5TsD0qDq27RHr-XDnAjToQ/exec",
  TEAMS: [
    "광주지역)영업1팀","광주지역)영업2팀",
    "전남지역)영업1팀","전남지역)영업2팀",
    "전북지역)영업1팀","전북지역)영업2팀",
    "대전지역)영업1팀","대전지역)영업2팀",
    "충남지역)영업1팀","충남지역)영업2팀",
    "충북지역)영업1팀",
    "천안지역)영업1팀"
  ],
  MONITOR_ITEMS: [
    "청결 상태","상품 진열","조명 상태","간판·외관","냉장·냉동 설비"
  ]
};
async function compressImage(base64) {
  if (!base64) return "";
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800;
      const ratio = Math.min(max / img.width, max / img.height, 1);
      canvas.width  = img.width  * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = base64;
  });
}
let photoData = { 1: null, 2: null, 3: null };
let monitorResult = {};
let currentStep = 1;

window.onload = () => {
  document.getElementById("visitDate").value = new Date().toISOString().split("T")[0];
  const sel = document.getElementById("team");
  Config.TEAMS.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });
  const list = document.getElementById("monitorList");
  Config.MONITOR_ITEMS.forEach(item => {
    monitorResult[item] = "";
    list.innerHTML += `
      <div class="monitor-row">
        <div class="monitor-name">${item}</div>
        <div class="status-btns">
          ${["정상","미흡","불량"].map(v =>
            `<button class="status-btn" data-item="${item}" data-v="${v}"
              onclick="setStatus('${item}','${v}',this)">${v}</button>`
          ).join("")}
        </div>
      </div>`;
  });
};

function goStep(n) {
  if (n > currentStep) return;
  currentStep = n;
  renderStep();
}

function renderStep() {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec" + currentStep).classList.add("active");
  document.querySelectorAll(".step-item").forEach(s => {
    const n = parseInt(s.dataset.step);
    s.classList.remove("active","done");
    if (n === currentStep) s.classList.add("active");
    else if (n < currentStep) s.classList.add("done");
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function nextStep(from) {
  if (!validateStep(from)) return;
  currentStep = from + 1;
  if (currentStep === 4) buildSummary();
  renderStep();
}

function validateStep(n) {
  if (n === 1) {
    const miss = [];
    if (!document.getElementById("team").value)      miss.push("영업팀");
    if (!document.getElementById("storeCode").value) miss.push("점포코드");
    if (!document.getElementById("storeName").value) miss.push("점포명");
    if (!document.getElementById("manager").value)   miss.push("담당자명");
    if (!document.getElementById("visitDate").value) miss.push("방문일자");
    if (miss.length) { showToast("⚠ " + miss.join(", ") + " 입력 필요"); return false; }
  }
  if (n === 2) {
    if (!photoData[1] && !photoData[2] && !photoData[3]) {
      showToast("⚠ 사진을 최소 1장 촬영해주세요"); return false;
    }
  }
  return true;
}

function triggerFile(n) { document.getElementById("file" + n).click(); }

function loadPhoto(n, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoData[n] = e.target.result;
    const box = document.getElementById("box" + n);
    box.classList.add("has-photo");
    box.innerHTML = `
      <img src="${e.target.result}" alt="">
      <div class="overlay" style="color:#fff;font-size:13px">재촬영</div>
      <div class="photo-badge">✓</div>
      <input type="file" id="file${n}" accept="image/*" capture="environment" onchange="loadPhoto(${n},this)" style="display:none">`;
  };
  reader.readAsDataURL(file);
}

function setStatus(item, val, btn) {
  monitorResult[item] = val;
  document.querySelectorAll(`.status-btn[data-item="${item}"]`).forEach(b => b.classList.remove("sel"));
  btn.classList.add("sel");
}

function buildSummary() {
  const team    = document.getElementById("team").value;
  const code    = document.getElementById("storeCode").value;
  const name    = document.getElementById("storeName").value;
  const manager = document.getElementById("manager").value;
  const date    = document.getElementById("visitDate").value;
  const photos  = [1,2,3].filter(n => photoData[n]).length;
  let html = `
    <div class="result-row"><span>영업팀</span><span>${team}</span></div>
    <div class="result-row"><span>점포코드</span><span>${code}</span></div>
    <div class="result-row"><span>점포명</span><span>${name}</span></div>
    <div class="result-row"><span>담당자</span><span>${manager}</span></div>
    <div class="result-row"><span>방문일자</span><span>${date}</span></div>
    <div class="result-row"><span>사진</span><span>${photos}장 첨부</span></div>
    <hr style="margin:10px 0;border:none;border-top:1px solid var(--border)">`;
  Config.MONITOR_ITEMS.forEach(item => {
    const v = monitorResult[item] || "—";
    const color = v==="정상"?"var(--ok)":v==="미흡"?"var(--warn)":v==="불량"?"var(--bad)":"var(--muted)";
    html += `<div class="result-row"><span>${item}</span><span style="color:${color};font-weight:700">${v}</span></div>`;
  });
  document.getElementById("summaryBox").innerHTML = html;
}

async function submitAll() {
  if (Config.SCRIPT_URL === "여기에_Apps_Script_URL_붙여넣기") {
    showToast("⚠ Apps Script URL 설정 후 전송 가능합니다"); return;
  }
  showLoading("데이터 준비 중…");
  const payload = {
    team:      document.getElementById("team").value,
    storeCode: document.getElementById("storeCode").value,
    storeName: document.getElementById("storeName").value,
    manager:   document.getElementById("manager").value,
    visitDate: document.getElementById("visitDate").value,
    photo1: photoData[1] || "",
    photo2: photoData[2] || "",
    photo3: photoData[3] || "",
    cmt1: document.getElementById("cmt1").value,
    cmt2: document.getElementById("cmt2").value,
    cmt3: document.getElementById("cmt3").value,
    monitor: monitorResult,
    note: document.getElementById("overallNote").value,
    submittedAt: new Date().toLocaleString("ko-KR")
  };
  try {
  setLoadingText("사진 압축 중…");
    payload.photo1 = await compressImage(payload.photo1);
    payload.photo2 = await compressImage(payload.photo2);
    payload.photo3 = await compressImage(payload.photo3);
    setLoadingText("Google Sheets 전송 중…");
    await fetch(Config.SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
      mode: "no-cors"
    });
    hideLoading();
    showResult(payload, { row: "시트 확인" });
  } catch(e) {
    hideLoading();
    showToast("❌ 전송 실패: " + e.message);
  }
}

function showResult(payload, result) {
  currentStep = 5;
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec5").classList.add("active");
  document.getElementById("resultDetail").innerHTML = `
    <div class="result-row"><span>📋 시트 행</span><span>${result.row}번째 행</span></div>
    <div class="result-row"><span>📁 Drive 폴더</span><span>${payload.team} / ${payload.visitDate}</span></div>
    <div class="result-row"><span>📷 저장된 사진</span><span>${[1,2,3].filter(n=>photoData[n]).length}장</span></div>
    <div class="result-row"><span>⏰ 제출 시각</span><span>${payload.submittedAt}</span></div>`;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetAll() {
  photoData = { 1: null, 2: null, 3: null };
  monitorResult = {};
  currentStep = 1;
  ["team","storeCode","storeName","manager","overallNote"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = id === "team" ? "" : "";
  });
  document.getElementById("visitDate").value = new Date().toISOString().split("T")[0];
  [1,2,3].forEach(n => {
    document.getElementById("cmt" + n).value = "";
    const box = document.getElementById("box" + n);
    if (box) {
      box.classList.remove("has-photo");
      box.innerHTML = `<span class="photo-icon">${n===1?"🏪":n===2?"🏬":"📌"}</span>
        <input type="file" id="file${n}" accept="image/*" capture="environment" onchange="loadPhoto(${n},this)" style="display:none">`;
    }
  });
  document.querySelectorAll(".status-btn").forEach(b => b.classList.remove("sel"));
  Config.MONITOR_ITEMS.forEach(item => monitorResult[item] = "");
  renderStep();
}

function showLoading(msg) {
  document.getElementById("loadingText").textContent = msg || "처리 중…";
  document.getElementById("loadingWrap").classList.add("show");
}
function setLoadingText(msg) { document.getElementById("loadingText").textContent = msg; }
function hideLoading() { document.getElementById("loadingWrap").classList.remove("show"); }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
